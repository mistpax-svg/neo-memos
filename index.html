<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEO MEMO</title>
    
    <link rel="apple-touch-icon" href="./icon_clean.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./icon_clean.png">
    <link rel="shortcut icon" href="./icon_clean.png">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NEO MEMO">

    <style>
        :root {
            --notebook-yellow: #fdf5b7;
            --stripe-blue: #b9d5ec;
            --line-height: 34px; 
            --accent-gold: #e2d17c;
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #dcdcdc;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        body {
            align-items: flex-start;
            padding-top: 40px;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        }

        .notebook {
            width: 92%;
            max-width: 450px;
            background-color: var(--notebook-yellow);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 12px;
            padding: 25px;
            border-left: 12px solid var(--accent-gold);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .header-info {
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 12px;
            border-bottom: 2px solid #edca82;
            padding-bottom: 6px;
            font-weight: 600;
        }

        .memo-area {
            width: 100%;
            height: 300px;
            background-image: linear-gradient(var(--stripe-blue) 1px, transparent 1px);
            background-size: 100% var(--line-height);
            line-height: var(--line-height);
            border: none;
            outline: none;
            resize: none;
            background-color: transparent;
            font-size: 19px;
            color: #333;
            overflow-y: auto;
            padding: 0;
            margin-top: 5px;
        }

        .save-btn {
            width: 100%;
            height: 55px;
            margin-top: 20px;
            background-color: #333333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }

        .save-btn:active {
            background-color: #000;
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="notebook">
    <div class="header-info" id="current-time">시간 로딩 중...</div>
    <textarea class="memo-area" id="memo-input" placeholder="메모를 입력하세요..." spellcheck="false"></textarea>
    <button class="save-btn" onclick="sendToGmail()">기입</button>
</div>

<script>
    function updateDateTime() {
        const now = new Date();
        const options = { 
            year: 'numeric', month: 'numeric', day: 'numeric', 
            hour: '2-digit', minute: '2-digit', second: '2-digit', 
            hour12: true 
        };
        document.getElementById('current-time').innerText = now.toLocaleString('ko-KR', options);
    }

    function sendToGmail() {
        const content = document.getElementById('memo-input').value;
        const timeInfo = document.getElementById('current-time').innerText;

        if (!content.trim()) {
            alert("내용을 입력해 주세요!");
            return;
        }

        const subject = encodeURIComponent(`[NEO MEMO] ${timeInfo}`);
        const body = encodeURIComponent(`작성시간: ${timeInfo}\n\n내용:\n${content}`);
        window.location.href = `mailto:mistpax@gmail.com?subject=${subject}&body=${body}`;
    }

    updateDateTime();
    setInterval(updateDateTime, 1000);
</script>
</body>
</html>
