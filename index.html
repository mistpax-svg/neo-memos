<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEO MEMO</title>
    
    <link rel="apple-touch-icon" href="https://via.placeholder.com/1024x1024.png?text=MEMO"> 
    <link rel="icon" type="image/png" href="https://via.placeholder.com/192x192.png?text=MEMO">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NEO MEMO">

    <style>
        :root {
            --notebook-yellow: #fdf5b7;
            --stripe-blue: #b9d5ec;
            --line-height: 34px; 
            --accent-gold: #e2d17c;
        }

        /* 배경 및 수첩 디자인 (이전과 동일하게 유지하여 일관성 부여) */
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #dcdcdc;
            display: flex;
            justify-content: center;
        }

        body {
            align-items: flex-start;
            padding-top: 40px;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
        }

        .notebook {
            width: 92%;
            max-width: 450px;
            background-color: var(--notebook-yellow);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 12px;
            padding: 25px;
            border-left: 12px solid var(--accent-gold);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .header-info {
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 12px;
            border-bottom: 2px solid #edca82;
            padding-bottom: 6px;
            font-weight: 600;
        }

        .memo-area {
            width: 100%;
            height: 300px;
            background-image: linear-gradient(var(--stripe-blue) 1px, transparent 1px);
            background-size: 100% var(--line-height);
            line-height: var(--line-height);
            border: none;
            outline: none;
            resize: none;
            background-color: transparent;
            font-size: 19px;
            color: #333;
            overflow-y: auto;
            spellcheck: false;
        }

        .save-btn {
            width: 100%;
            height: 55px;
            margin-top: 20px;
            background-color: #333333;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="notebook">
    <div class="header-info" id="current-time"></div>
    <textarea class="memo-area" id="memo-input" placeholder="메모를 입력하세요..." spellcheck="false"></textarea>
    <button class="save-btn" onclick="saveMemo()">기입</button>
</div>

<script>
    function updateDateTime() {
        const now = new Date();
        const options = { 
            year: 'numeric', month: 'numeric', day: 'numeric', 
            hour: '2-digit', minute: '2-digit', second: '2-digit', 
            hour12: true 
        };
        document.getElementById('current-time').innerText = now.toLocaleString('ko-KR', options);
    }

    function saveMemo() {
        const content = document.getElementById('memo-input').value;
        const timeInfo = document.getElementById('current-time').innerText;
        const btn = document.querySelector('.save-btn');

        if (!content.trim()) {
            alert("내용을 입력해 주세요!");
            return;
        }

        btn.innerText = "전송 중...";
        btn.disabled = true;

        google.script.run
            .withSuccessHandler(function() {
                alert("Gmail로 전송되었습니다!");
                document.getElementById('memo-input').value = "";
                btn.innerText = "기입";
                btn.disabled = false;
                updateDateTime();
            })
            .withFailureHandler(function(err) {
                alert("전송 실패: " + err);
                btn.innerText = "기입";
                btn.disabled = false;
            })
            .sendMemoToGmail(content, timeInfo);
    }

    updateDateTime();
    setInterval(updateDateTime, 1000);
</script>
</body>
</html>
